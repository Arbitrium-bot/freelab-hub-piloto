services:
  - type: web
    name: freelab-hub-piloto
    env: python
    plan: free
    buildCommand: ""
    startCommand: "python server.py"
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: DATA_DIR
        value: "/var/data/freelab-hub"
      - key: ADMIN_EMAIL
        value: "admin@freelabhub.com"
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_PAYMENT_LINK_LAB
        sync: false
      - key: STRIPE_PAYMENT_LINK_FREELANCER
        sync: false
